









apiVersion: v1
kind: Pod
metadata:
  name: compliant-pod
spec:
  containers:
    - name: app
      image: docker.io/library/busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
